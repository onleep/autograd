services:
  app:
    build: .
    restart: on-failure:1
    depends_on:
      minio:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ID}
      MINIO_ROOT_PASSWORD: ${S3_KEY}
    volumes:
      - minio:/data
    healthcheck:
      test: mc ready local
      interval: 1s
      retries: 10
  mysql:
    image: mysql:8.4.6
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: MYSQL_PWD=${DB_PASS} mysql -e 'SELECT 1'
      interval: 1s
      retries: 10
  phpmyadmin:
    image: phpmyadmin:5.2.3
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
  grafana:
    image: grafana/grafana:12.4.0-19291686361
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_NAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASS}
    volumes:
      - grafana:/var/lib/grafana
  caddy:
    image: caddy:latest
    ports:
      - 80:80
      - 443:443
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
volumes:
  minio: null
  mysql: null
  grafana: null
  caddy_data: null
  caddy_config: null

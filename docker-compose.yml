services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    ports:
      - 9001:9001
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ID}
      MINIO_ROOT_PASSWORD: ${S3_KEY}
    volumes:
      - minio:/data
    healthcheck:
      test: mc ready local
      interval: 1s
      retries: 10
  mysql:
    image: mysql:8.4.6
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: MYSQL_PWD=${DB_PASS} mysql -e 'SELECT 1'
      interval: 1s
      retries: 10
  phpmyadmin:
    image: phpmyadmin:5.2.3
    restart: unless-stopped
    ports:
      - 8080:80
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
volumes:
  minio: null
  mysql: null
